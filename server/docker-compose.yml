services:
  sync:
    build: .
    # When consuming a published image instead of building locally, replace
    # `build: .` with (see README "Publishing the image" — multi-arch, so it
    # works on x86 and ARM Macs alike):
    # image: myregistry.azurecr.io/claude-account-switcher-sync:0.2.2
    ports:
      - "8787:8787"
    volumes:
      - cas-data:/data
    environment:
      # Uncomment to require a token for new-user registration:
      # CAS_REGISTRATION_TOKEN: "choose-a-token"
      CAS_DB_PATH: /data/switcher.db
    restart: unless-stopped

volumes:
  cas-data:
